name: Deploy Google Play Internal

on:
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane -N

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_FILE }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build the unsigned AAB
      - name: Build Unsigned Release Bundle
        run: ./gradlew bundleRelease
      
      # Sign the AAB (Separate step as requested)
      - name: Sign App Bundle (AAB)
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x sign_artifacts.sh
          ./sign_artifacts.sh app/build/outputs/bundle/release/app-release.aab release.keystore ${{ secrets.KEY_ALIAS }}

      - name: Upload Signed Bundle to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-aab
          path: app/build/outputs/bundle/release/*-signed.aab

      # Upload to Google Play Store using Fastlane
      - name: Upload to Play Store with Fastlane
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          # 1. Prepare Release Note (Example: Dynamic info or tag name)
          CUSTOM_NOTE="Automated release for version ${{ github.ref_name }} (Build: $(date +'%Y-%m-%d %H:%M:%S'))"
          
          # 2. Run Fastlane and pass the note as an option
          fastlane android deploy note:"$CUSTOM_NOTE"
