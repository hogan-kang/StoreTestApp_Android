name: Build and Sign Release

on:
  workflow_dispatch: # Allow manual trigger
  push:
    tags:
      - 'v*' # Trigger on version tags

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Upgrade Ruby version to 3.2+
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane -N

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_FILE }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build only the unsigned AAB, which is required for Play Store
      - name: Build Unsigned Release Bundle
        run: ./gradlew bundleRelease
      
      # Sign only the AAB
      - name: Sign App Bundle (AAB)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x sign_artifacts.sh
          ./sign_artifacts.sh app/build/outputs/bundle/release/app-release.aab release.keystore ${{ secrets.KEY_ALIAS }}

      - name: Upload Signed Bundle to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-aab
          path: app/build/outputs/bundle/release/*-signed.aab

      # Upload to Google Play Store using Fastlane Supply CLI
      - name: Upload to Play Store with Fastlane
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          # 1. Create temporary service account file
          echo "$SERVICE_ACCOUNT_JSON" > service_account.json
          
          # 2. Generate Release Notes with current timestamp
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          RELEASE_NOTES="{\"en-US\": \"Automated release at $TIMESTAMP\"}"
          
          # 3. Run fastlane supply
          # Removed --skip_upload_changelogs to allow release notes
          fastlane supply \
            --package_name "com.hogan.kang.storetest" \
            --json_key "service_account.json" \
            --aab "app/build/outputs/bundle/release/app-release-signed.aab" \
            --track "internal" \
            --release_status "draft" \
            --clear_previous_drafts true \
            --release_notes "$RELEASE_NOTES" \
            --skip_upload_apk true \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true
          
          # 4. Clean up
          rm service_account.json
