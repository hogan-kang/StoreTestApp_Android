name: Build and Sign Release

on:
  workflow_dispatch: # Allow manual trigger
  push:
    tags:
      - 'v*' # Trigger on version tags

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_FILE }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build only the unsigned AAB, which is required for Play Store
      - name: Build Unsigned Release Bundle
        run: ./gradlew bundleRelease
      
      # Sign only the AAB
      - name: Sign App Bundle (AAB)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x sign_artifacts.sh
          ./sign_artifacts.sh app/build/outputs/bundle/release/app-release.aab release.keystore ${{ secrets.KEY_ALIAS }}

      - name: Upload Signed Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-aab
          path: app/build/outputs/bundle/release/*-signed.aab

      # Upload to Google Play Store
      - name: Upload to Play Store
        if: startsWith(github.ref, 'refs/tags/v') # Only upload when triggered by a version tag
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.hogan.kang.storetest
          releaseFiles: app/build/outputs/bundle/release/app-release-signed.aab
          track: internal # Upload to internal testing track
          status: draft # Upload as draft so you can verify before release
