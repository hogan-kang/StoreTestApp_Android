name: Build and Sign Release

on:
  workflow_dispatch: # Allow manual trigger
  push:
    tags:
      - 'v*' # Trigger on version tags

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for dynamic versioning (git rev-list)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 1. Build Step: Produce Unsigned Artifacts
      # Gradle is configured to NOT sign by default
      - name: Build Unsigned Release
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease

      # 2. Preparation Step: Decode Keystore
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_FILE }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > release.keystore

      # 3. Setup Android SDK Build-Tools (for apksigner/zipalign)
      - name: Add Android Build-Tools to PATH
        run: |
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          # Fallback: find the latest version dynamically if specific version fails
          find $ANDROID_HOME/build-tools -maxdepth 1 -type d | sort -r | head -n 1 >> $GITHUB_PATH

      # 4. Sign Step: Explicitly sign the artifacts using our script
      - name: Sign Artifacts
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x sign_artifacts.sh
          
          # Sign AAB (Default name is usually app-release.aab)
          ./sign_artifacts.sh app/build/outputs/bundle/release/app-release.aab release.keystore ${{ secrets.KEY_ALIAS }}
          
          # Sign APK (Default name for unsigned build is app-release-unsigned.apk)
          ./sign_artifacts.sh app/build/outputs/apk/release/app-release-unsigned.apk release.keystore ${{ secrets.KEY_ALIAS }}

      # 5. Upload Signed Artifacts to GitHub (Backup)
      - name: Upload Signed Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-aab
          path: app/build/outputs/bundle/release/*-signed.aab

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-apk
          path: app/build/outputs/apk/release/*-signed.apk

      # 6. Upload to Google Play Store
      - name: Upload to Play Store
        if: startsWith(github.ref, 'refs/tags/v') # Only upload when triggered by a version tag
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.hogan.kang.storetest
          releaseFiles: app/build/outputs/bundle/release/app-release-signed.aab
          track: internal # Upload to internal testing track
          status: draft # Upload as draft so you can verify before release
